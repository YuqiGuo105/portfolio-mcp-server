name: Deploy portfolio-mcp-server

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: portfolio-notify-prod
  REGION: us-central1
  ARTIFACT_REPO: portfolio
  IMAGE_NAME: portfolio-mcp-server
  SERVICE_NAME: portfolio-mcp-server
  RUNTIME_SA_EMAIL: admin-platform-runtime@portfolio-notify-prod.iam.gserviceaccount.com

jobs:
  deploy:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          TAG="sha-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${{ steps.tag.outputs.tag }}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run (budget-optimized)
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --service-account="${RUNTIME_SA_EMAIL}" \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=0 \
            --max-instances=1 \
            --memory=256Mi \
            --cpu=1 \
            --cpu-boost \
            --cpu-throttling \
            --timeout=60 \
            --concurrency=80 \
            --set-env-vars="NODE_ENV=production,MCP_GATEWAY_URL=${{ vars.MCP_GATEWAY_URL }},SITE_URL=${{ vars.SITE_URL }},MAX_CONTENT_LENGTH=${{ vars.MAX_CONTENT_LENGTH }},ADMIN_ALLOWED_EMAILS=${{ vars.ADMIN_ALLOWED_EMAILS }}" \
            --update-secrets="MCP_GATEWAY_INTERNAL_TOKEN=MCP_GATEWAY_INTERNAL_TOKEN:latest,SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --region="${REGION}" --project="${PROJECT_ID}" \
            --format='value(status.url)')
          for i in $(seq 1 20); do
            if curl -sf "${URL}/health" | grep -q '"ok"'; then
              echo "Health check passed: ${URL}"
              exit 0
            fi
            sleep 3
          done
          echo "Smoke test failed"
          exit 1
